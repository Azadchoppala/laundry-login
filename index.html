<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log in Page</title>
    <link rel="stylesheet" href="./index.css" />
  </head>
  <body>
    <div class="container">
      <div class="left">
        <img
          src="./13693594_2101.i039.007.laundry washing isometric.svg"
          alt=""
        />
      </div>
      <div class="right">
        <h1>Hello Again!</h1>

        <p class="p1">Welcome back! We missed you!</p>
        <br /><br />
        <form action="#">
          <label for="email">Email</label>
          <br />
          <br />
          <input type="email" id="email" placeholder="emailid@site.com" />
          <br /><br />
          <label for="password">Password</label>
          <br /><br />
          <input type="password" id="password" placeholder="Password" />
          <br /><br />
          <a href="#" class="a1">Forgot Password</a><br />
          <br />
          <button>Login</button>
          <br /><br />
          <p>Not a member? <a href="#">Register Now</a></p>
        </form>
      </div>
    </div>
  </body>
</html>
